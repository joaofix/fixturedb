# Regex/heuristic pattern catalogs behind the quantitative fixture metrics
# computed in collection/detector_shared.py and collection/complexity_provider.py:
# mock-framework detection, external I/O call detection, object-instantiation
# (constructor) detection, and setup/teardown pairing.
#
# Executable source of truth, loaded via
# collection/config_data/load_feature_extraction_patterns() -- editing a
# pattern or pairing here is a YAML change, not a Python change. Same intent
# as fixture_definitions.yaml: make the metric-detection signal auditable
# without reading multiple Python functions across two files.
#
# Test-double category classification
# ====================================
# mock_patterns below only detects THAT a mock construct exists (which
# framework, what's being targeted) -- it no longer carries the
# construct's category. Category (dummy/stub/spy/mock/fake -- the classic
# Meszaros taxonomy; see also Fowler's "Mocks Aren't Stubs") is computed at
# detection time, per match, by scanning the actual matched code (the
# snippet around the call plus its captured target identifier) for one of
# `mock_category_keywords` below, case-insensitively, substring match, in
# list order (first match wins). This is deliberately the same method used
# in related work: parse the code, check whether any nearby identifier
# contains one of the category terms.
#
# "mock" is developers' and the testing literature's own informal name for
# the whole family, so it is listed last and doubles as the fallback when
# no more specific term is found nearby -- not a special case, just the
# least specific term. Unlike the old per-pattern-entry static category,
# `dummy` is now a real, reachable outcome: a construct assigned to an
# identifier containing "dummy" (e.g. `dummy_request = Mock()`) is
# classified dummy, since the classification is driven by what the code
# actually calls the thing, not by which library function created it.
mock_category_keywords:
  - category: dummy
    terms: [dummy, dummies]
  - category: stub
    terms: [stub]
  - category: spy
    terms: [spy, spies]
  - category: fake
    terms: [fake]
  - category: mock
    terms: [mock]

# Each entry: pattern (regex, applied case-insensitively against the
# fixture's own source text) + the mock framework it signals. Category is
# no longer part of this table (see "Test-double category classification"
# above). Order doesn't affect results -- every pattern is scanned against
# every fixture body, so a fixture can match more than one framework/pattern.
mock_patterns:
  # Python
  - pattern: 'mock\.patch\s*\(\s*[''"]([^''"]+)[''"]'
    framework: unittest_mock
  - pattern: 'mock\.patch\.object\s*\(\s*(\w+)'
    framework: unittest_mock
    note: >
      mock.patch.object(target, 'attr', ...) -- a distinct call shape from
      mock.patch('dotted.path'); previously missed entirely since the plain
      .patch( pattern requires an opening paren immediately after "patch",
      which .object( breaks.
  - pattern: 'create_autospec\s*\(\s*(\w+)'
    framework: unittest_mock
  - pattern: 'mocker\.patch\s*\(\s*[''"]([^''"]+)[''"]'
    framework: pytest_mock
  - pattern: 'mocker\.patch\.object\s*\(\s*(\w+)'
    framework: pytest_mock
    note: "pytest-mock's mocker.patch.object -- same gap as mock.patch.object above."
  # Bare patch(...)/patch.object(...), i.e. `from unittest.mock import patch`
  # then calling it unqualified -- at least as common as the mock.patch(...)
  # form and previously not covered at all. Negative lookbehind excludes
  # mock.patch(/mocker.patch( so this can't double-count alongside those
  # two patterns above.
  - pattern: '(?<!mock\.)(?<!mocker\.)\bpatch\s*\(\s*[''"]([^''"]+)[''"]'
    framework: unittest_mock
  - pattern: '(?<!mock\.)(?<!mocker\.)\bpatch\.object\s*\(\s*(\w+)'
    framework: unittest_mock
  # \b before the bare "Mock(" alternative matters: without it, this also
  # matches as a substring inside any identifier ending in "...Mock(" --
  # notably Java's EasyMock.createMock(...) and Kotlin/MockK's mock(...)
  # family -- since this pattern list is scanned language-agnostically
  # against every fixture regardless of source language. MagicMock(/
  # AsyncMock( are unaffected either way (the leftmost-match rule means
  # they're consumed whole by their own alternative before "Mock(" is ever
  # tried at a later position within the same word).
  - pattern: 'MagicMock\s*\(|\bMock\s*\(|AsyncMock\s*\('
    framework: unittest_mock
  # pytest's built-in monkeypatch fixture. Not a mock *library* the way the
  # others are, but the same test-isolation-via-patching concept the
  # num_mocks metric is meant to capture, and previously not covered at all.
  # Capture group is the operation name (setattr/setenv/...), not a target
  # identifier -- monkeypatch's first argument is too variable in shape
  # (object reference, dotted string, or plain name) to extract reliably.
  - pattern: 'monkeypatch\.(setattr|delattr|setenv|delenv|setitem|delitem)\s*\('
    framework: pytest_monkeypatch
  # Java
  - pattern: 'Mockito\.mock\s*\(\s*(\w+)\.class'
    framework: mockito
  - pattern: '@Mock\b'
    framework: mockito
  - pattern: 'Mockito\.spy\s*\(\s*(\w+)'
    framework: mockito
  - pattern: 'EasyMock\.createMock\s*\(\s*(\w+)\.class'
    framework: easymock
  # Static-import Mockito usage (`import static org.mockito.Mockito.mock;`
  # then a bare `mock(Foo.class)` call) -- NOT Kotlin's MockK, despite an
  # earlier version of this pattern being labeled that way. MockK's own
  # class-literal syntax is `Foo::class`, never `Foo.class` (a Java-only
  # construct), so this pattern -- which requires a literal ".class" --
  # can only ever match Java source, confirmed via a real toy Dataset A
  # run where every "mockk"-labeled hit was Java code using this exact
  # static-import idiom. (?<!\.) excludes qualified calls like
  # "Mockito.mock(" -- without it, this bare "mock(" pattern also matches
  # as a substring of Mockito.mock(...), double-counting the same call
  # site under both patterns.
  - pattern: '(?<!\.)\bmock\s*\(\s*(\w+)\.class'
    framework: mockito
  # JavaScript / TypeScript
  - pattern: 'jest\.fn\s*\('
    framework: jest
  - pattern: 'jest\.spyOn\s*\('
    framework: jest
  - pattern: 'jest\.mock\s*\(\s*[''"]([^''"]+)[''"]'
    framework: jest
  - pattern: 'jest\.mocked\s*\(\s*(\w+)'
    framework: jest
  - pattern: 'jest\.createMockFromModule\s*\(\s*[''"]([^''"]+)[''"]'
    framework: jest
  # sinon.(stub|spy|mock|fake|replace) used to be one alternation; split so
  # each verb keeps its own regex entry (its own call site should still be
  # counted as a distinct match even though category no longer lives here).
  - pattern: 'sinon\.stub\s*\('
    framework: sinon
  - pattern: 'sinon\.spy\s*\('
    framework: sinon
  - pattern: 'sinon\.mock\s*\('
    framework: sinon
  - pattern: 'sinon\.fake\s*\('
    framework: sinon
  - pattern: 'sinon\.replace\s*\('
    framework: sinon
  - pattern: 'sinon\.createStubInstance\s*\(\s*(\w+)'
    framework: sinon
  - pattern: 'vi\.fn\s*\('
    framework: vitest
  - pattern: 'vi\.mock\s*\(\s*[''"]([^''"]+)[''"]'
    framework: vitest
  # Go (detector_go.py is dead code / not wired in -- kept for parity with
  # the original pattern table in case Go detection is ever enabled)
  - pattern: 'gomock\.NewController'
    framework: gomock
  - pattern: 'testify/mock'
    framework: testify_mock
  - pattern: '\.On\s*\(\s*[''"](\w+)[''"]'
    framework: testify_mock

# Known gaps -- documented for the same reason fixture_definitions.yaml
# documents fixture-detection exclusions: absence should be a decision a
# reviewer can see, not a silent oversight.
mock_patterns_excluded:
  - case: "unittest.mock context-manager/decorator wrapper helpers defined by the project itself (e.g. a custom @mock_db decorator that calls mock.patch internally)"
    reason: "Matching is purely textual against the fixture's own source; a call to a project-defined wrapper doesn't contain any of the patterns above at the call site."
  - case: "Chai/sinon-chai assertion-only usage with no stub/spy/mock/fake/replace/createStubInstance call in the same fixture"
    reason: "We detect mock creation, not mock-flavored assertions; a fixture that only asserts against a mock created elsewhere (e.g. in a shared beforeEach) won't show a match in its own body."
  - case: "PowerMock (@RunWith(PowerMockRunner.class), PowerMock.mockStatic(...), etc.)"
    reason: >
      Not in the mock_patterns table -- a niche/legacy framework for
      mocking static methods and final classes, deliberately out of scope.
      A fixture using only PowerMock APIs will have has_teardown_pair and
      other structural metrics computed normally, but num_mocks=0.
  - case: "jest.mock('./module') at its conventional call site (module top level, auto-hoisted by babel-jest), rather than inside a beforeEach/test body"
    reason: >
      Mock detection scans only the fixture's own AST node text, not
      surrounding module-level statements. jest.mock() is idiomatically
      written at the top of the file specifically because Jest hoists it
      above imports -- so this pattern will rarely fire in real code even
      though it's in the table above. This is a structural limitation of
      fixture-scoped scanning, not specific to Jest: any mock setup placed
      outside the fixture body (module level, a shared helper function,
      etc.) is invisible to this detector for every language/framework.

# Substrings counted (near a mock_patterns match) to estimate how many
# interactions/assertions were configured on that mock.
mock_interaction_keywords:
  - return_value
  - side_effect
  - thenReturn
  - thenThrow
  - doReturn

# Patterns counted as "external calls" (I/O / system operations), matched
# case-insensitively against the fixture's own source text. This is a
# custom heuristic since Lizard's external_call_count measures
# inter-function calls within the module, not I/O specifically.
external_call_patterns:
  - pattern: '\bopen\s*\('
    matches: "file I/O"
  - pattern: '\bconnect\s*\('
    matches: "db/network connections"
  - pattern: '\bcreate_engine\s*\('
    matches: "SQLAlchemy engine creation"
  - pattern: '\bsession\s*\.'
    matches: "db sessions"
  - pattern: '\brequests?\.'
    matches: "HTTP (requests library)"
  - pattern: '\bhttpclient\b'
    matches: "HTTP client (Go/Java)"
  - pattern: '\bos\.environ\b'
    matches: "environment/config access"
  - pattern: '\bsubprocess\.'
    matches: "subprocess calls"
  - pattern: '\bsocket\s*\('
    matches: "raw sockets"
  - pattern: '\btempfile\.'
    matches: "filesystem temp files"
  - pattern: '\bshutil\.'
    matches: "filesystem operations"

# Patterns counted as object instantiations (constructors), filtered against
# Lizard's external_call_count for validation (see
# complexity_provider._count_object_instantiations). `languages: null` means
# the pattern applies to every language; otherwise it's restricted to the
# listed languages.
object_instantiation_patterns:
  - pattern: '\bnew\s+[\w.]+\s*(?:<.+?>)?\s*\('
    languages: null
    note: >
      Java/JavaScript/TypeScript: new ClassName(...), new
      ClassName<T>(...) including nested generics, and dotted/namespaced
      constructors such as new java.util.ArrayList() or new
      THREE.Vector3() (a common JS/TS idiom this pattern previously
      missed, since it required the class name to be a single \w+
      token).
  - pattern: '\b[A-Z][A-Za-z0-9_]*\s*\('
    languages: [python]
    note: >
      Heuristic: capitalized call ClassName(...) -- catches real
      constructors and factory functions styled like constructors. Not
      restricted to Python's actual class names, so it can overcount.

# Setup/teardown pairing (has_teardown_pair), split by detection mechanism:
teardown_detection:
  # fixture_type values where "has a teardown" is read directly from the
  # fixture's own body (a yield statement), not paired against another
  # fixture.
  yield_based_fixture_types: [pytest_decorator]

  # fixture_type values where setup and teardown share the SAME fixture_type
  # and are distinguished only by name (e.g. unittest_setup covers both
  # "setUp" and "tearDown"). Maps fixture_type -> {setup_name: teardown_name}.
  # These names must stay in sync with this file's python.unittest_setup /
  # python.pytest_class_method name maps (fixture_definitions.yaml).
  name_based_pairs:
    unittest_setup:
      setUp: tearDown
      setUpClass: tearDownClass
      setUpModule: tearDownModule
    pytest_class_method:
      setup_method: teardown_method
      setup_class: teardown_class

  # Some setup-side fixtures can ALSO register their own teardown inline,
  # via a cleanup-registration call made in the setup fixture's own body,
  # instead of (or in addition to) a separately-named teardown method --
  # e.g. unittest's self.addCleanup(...)/self.enterContext(...) inside
  # setUp(), or cls.addClassCleanup(...)/cls.enterClassContext(...) inside
  # setUpClass(). Without this, a setUp() that only uses addCleanup and
  # defines no separate tearDown() -- the modern, docs-recommended pattern
  # -- was reported as has_teardown_pair=0 despite genuinely having
  # teardown logic. Checked as an OR alongside name_based_pairs above, not
  # a replacement for it. Maps fixture_type -> {setup_name: [substrings
  # that, if found in the setup fixture's own raw_source, count as
  # evidence of self-registered teardown]}.
  # Note: there is no module-level equivalent (no addModuleCleanup exists
  # in unittest as of this writing), so setUpModule has no entry here.
  self_registered_cleanup:
    unittest_setup:
      setUp: ["addCleanup(", "enterContext("]
      setUpClass: ["addClassCleanup(", "enterClassContext("]

  # fixture_type values where setup and teardown are DIFFERENT fixture_types,
  # paired by type + matching scope (e.g. junit5_before_each's teardown is a
  # separate junit5_after_each fixture in the same class). Maps
  # setup_fixture_type -> teardown_fixture_type.
  #
  # junit4_before_class/junit4_after_class are included even though the
  # ambiguous @BeforeClass/@AfterClass resolution currently always produces
  # testng_before_class/testng_after_class instead (see
  # fixture_definitions.yaml's java.known_imprecisions) -- kept dormant here
  # so this mapping doesn't need to change if that disambiguation improves.
  type_based_pairs:
    junit5_before_each: junit5_after_each
    junit5_before_all: junit5_after_all
    junit4_before: junit4_after
    junit4_before_class: junit4_after_class
    testng_before_method: testng_after_method
    testng_before_class: testng_after_class
    junit3_setup: junit3_teardown
    before_each: after_each
    before_all: after_all
    mocha_before: mocha_after
